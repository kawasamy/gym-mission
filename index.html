<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>단백질 계산기</title>
    
    <!-- iOS PWA settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="오단완">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Manifest & Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0e12">
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="widget-container theme-yellow">
        <!-- Tab Header -->
        <div class="tab-header">
            <button class="tab-btn active" id="btn-tab-protein" onclick="switchTab('protein')">🥛 단백질</button>
            <button class="tab-btn" id="btn-tab-workout" onclick="switchTab('workout')">🏋️ 세트</button>
        </div>

        <div class="tab-views-wrapper">
            <!-- Protein Tab View -->
            <div id="view-protein" class="tab-view active">
                <header class="widget-header">
                    <h1>단백질 계산기</h1>
                    <div class="weight-settings">
                        <input type="number" id="weight-input" placeholder="몸무게" value="80" inputmode="numeric">
                        <span class="weight-unit">kg</span>
                    </div>
                </header>

                <!-- Progress Area -->
                <div class="progress-section">
                    <svg class="progress-ring" width="180" height="180">
                        <defs>
                            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="8" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <circle class="progress-ring-bg" cx="90" cy="90" r="76" />
                        <circle class="progress-ring-bar" cx="90" cy="90" r="76" />
                    </svg>
                    <div class="counter-display">
                        <span id="protein-total" class="total-number">0</span>
                        <span class="unit">g</span>
                        <span id="status-message" class="status-message">대기 중</span>
                    </div>
                </div>

                <!-- Target Info Section -->
                <div class="target-info-container">
                    <div class="info-row">
                        <span class="info-label" id="target-label">🎯 권장 (1.4x)</span>
                        <span id="target-remaining" class="info-value">권장까지 -0g</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label" id="max-label">⚡ 최적 (1.6x)</span>
                        <span id="max-remaining" class="info-value">최적까지 -0g</span>
                    </div>
                </div>

                <!-- Quick Add Section -->
                <div class="quick-add-grid">
                    <button class="btn-quick btn-neg" onclick="addProtein(-10)">-10g</button>
                    <button class="btn-quick btn-neg" onclick="addProtein(-5)">-5g</button>
                    <button class="btn-quick btn-neg" onclick="addProtein(-1)">-1g</button>
                    <button class="btn-quick" onclick="addProtein(1)">+1g</button>
                    <button class="btn-quick" onclick="addProtein(5)">+5g</button>
                    <button class="btn-quick" onclick="addProtein(10)">+10g</button>
                </div>

                <!-- Custom Add Input & Action Section -->
                <div class="input-section">
                    <input type="number" id="custom-amount" placeholder="직접 입력 (g)" inputmode="numeric" min="1" max="500">
                    <button class="btn-primary" onclick="addCustomProtein()">추가</button>
                </div>

                <!-- Reset & Undo Footer -->
                <footer class="widget-footer">
                    <button class="btn-undo" id="btn-undo" onclick="undoProtein()" disabled>
                        <svg class="icon-undo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7v6h6"></path>
                            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                        </svg>
                        <span>되돌리기</span>
                    </button>
                    <button class="btn-reset" id="btn-reset" onclick="confirmReset()">
                        <svg class="icon-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        <span>초기화</span>
                    </button>
                </footer>
            </div>

            <!-- Workout Tab View -->
            <div id="view-workout" class="tab-view">
                <header class="widget-header">
                    <h1>세트 카운터</h1>
                    <div class="stopwatch-container" onclick="handleStopwatchClick()">
                        <span id="stopwatch-display" class="stopwatch-time">운동 시작</span>
                    </div>
                </header>

                <!-- Workout Sets Display -->
                <div class="progress-section">
                    <div class="sets-circle">
                        <div class="sets-counter-display">
                            <span id="sets-total" class="sets-number">0</span>
                            <span class="sets-unit">SETS</span>
                        </div>
                    </div>
                </div>

                <!-- Active Rest Timer Display (Moved below circle) -->
                <div id="rest-timer-container" class="rest-timer-container">
                    <div id="rest-timer" class="rest-timer-display">
                        <span id="rest-timer-text" onclick="handleTimerClick()">02:00</span>
                    </div>
                    <button id="btn-timer-plus30" class="btn-timer-plus" onclick="add30Seconds(event)">+30s</button>
                </div>

                <!-- Last Rest Duration Display -->
                <div id="last-rest-container" class="last-rest-container" style="display: none;">
                    <span class="last-rest-label">이전 휴식</span>
                    <span id="last-rest-time" class="last-rest-value">-</span>
                </div>

                <!-- Timer Duration Presets -->
                <div class="timer-presets">
                    <button class="btn-preset-time" onclick="setTimerDuration(90)">1:30</button>
                    <button class="btn-preset-time active" onclick="setTimerDuration(120)">2:00</button>
                    <button class="btn-preset-time" onclick="setTimerDuration(150)">2:30</button>
                    <button class="btn-preset-time" onclick="setTimerDuration(180)">3:00</button>
                </div>

                <!-- Sets Controls Section -->
                <div class="quick-add-grid sets-controls">
                    <button class="btn-quick btn-neg" onclick="adjustSets(-1)">-1 세트</button>
                    <button class="btn-quick btn-sets-add" onclick="adjustSets(1)">+1 세트</button>
                </div>

                <!-- Reset Footer -->
                <footer class="widget-footer">
                    <button class="btn-reset" id="btn-reset-sets" onclick="confirmResetSets()">
                        <svg class="icon-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        <span>초기화</span>
                    </button>
                </footer>

                <!-- Support Button Promotion -->
                <div class="support-link-wrapper">
                    <button class="btn-support-link" onclick="openSupportModal()">
                        <svg class="icon-support" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
                            <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path>
                            <line x1="6" y1="2" x2="6" y2="4"></line>
                            <line x1="10" y1="2" x2="10" y2="4"></line>
                            <line x1="14" y1="2" x2="14" y2="4"></line>
                        </svg>
                        <span>만든놈에게 한스쿱 보내기</span>
                    </button>
                </div>

                <!-- Blog Link Promotion -->
                <div class="blog-link-wrapper">
                    <a href="https://blog.naver.com/arikina04" target="_blank" rel="noopener noreferrer" class="btn-blog-link">
                        <svg class="icon-blog" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                        <span>만든놈 블로그 방문하기</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Support Modal -->
    <div id="support-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-emoji">🥛</span>
                <h2>잠깐만요.</h2>
            </div>
            <div class="modal-body">
                <p class="modal-p1">여기까지 눌러주신 마음만으로도 충분해요.</p>
                <p class="modal-p2">그 마음은 주변의 어려운 이웃에게 전하시거나,</p>
                <p class="modal-p2">오늘 운동한 스스로에게 단백질 한 스푼 선물해주세요.</p>
                <p class="modal-highlight">오늘도 안전하게 득근하세요! 💪</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-close" onclick="closeSupportModal()">쇠질하러 가기 🏋️‍♂️</button>
            </div>
        </div>
    </div>

    <!-- Hidden video for iOS screen wake lock -->
    <video id="wake-lock-video" loop muted playsinline preload="auto" style="position: absolute; width: 1px; height: 1px; top: -10px; left: -10px; opacity: 0.01; pointer-events: none;">
        <source src="data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAAAh3aWRlAAAAF21kYXTaAYCAgCBQbGf/gBtAYCAgA==" type="video/mp4">
    </video>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Register Service Worker for offline capability
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Registration Failed', err));
            });
        }
    </script>
</body>
</html>
